<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desktop Buddy</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div id="island-container">
      <div id="island-capsule" class="hidden">
        <div id="avatar-wrapper">
          <img id="alien-avatar" src="/src/assets/alien-transparent.png" alt="Anti-gravity Alien" />
        </div>
        <div id="message-panel">
          <span id="state-text"></span>
        </div>
      </div>
    </div>

    <!-- Right-click context menu (positioned via CSS, shown on contextmenu event) -->
    <div id="ctx-menu">
      <button id="ctx-sleep-15">💤 休眠 15 分钟</button>
      <button id="ctx-sleep-30">💤 休眠 30 分钟</button>
      <div class="ctx-divider"></div>
      <button id="ctx-cancel-sleep" style="display:none">▶ 取消休眠</button>
    </div>
  </body>
</html>
